<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitBook — Legal</title>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --accent: #6366f1; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .subtitle { color: var(--muted); margin-bottom: 40px; }
    .links { display: flex; gap: 16px; justify-content: center; }
    .links a { padding: 12px 24px; border-radius: 8px; background: var(--card); color: var(--text); font-weight: 600; font-size: 1rem; text-decoration: none; }
    .links a:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>FitBook</h1>
    <p class="subtitle">Legal information</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </div>
</body>
</html>
